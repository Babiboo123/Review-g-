<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEA Pro - Hệ Thống Ôn Thi Kiến Trúc Máy Tính</title>
    <!-- Import Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --card: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 900px;
        }

        /* Navbar & Theme Toggle */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .theme-toggle {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            color: var(--text-main);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        /* Stats Bar */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: var(--card);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid var(--border);
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .stat-value { font-size: 1.5rem; font-weight: 700; display: block; }
        .stat-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }

        /* Main Quiz Card */
        .quiz-card {
            background: var(--card);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        .progress-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 6px;
            background: var(--border);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #a855f7);
            width: 0%;
        }

        /* Selection Screen */
        .setup-screen h2 { margin-top: 0; font-size: 1.8rem; }
        
        select {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid var(--border);
            background: var(--card);
            color: var(--text-main);
            font-size: 1rem;
            margin: 20px 0;
            cursor: pointer;
            appearance: none;
        }

        /* Question Styles */
        .question-meta { display: flex; justify-content: space-between; margin-bottom: 15px; color: var(--primary); font-weight: 600; font-size: 0.9rem; }
        .question-text { font-size: 1.4rem; font-weight: 700; line-height: 1.4; margin-bottom: 30px; }

        .options-list { display: grid; gap: 12px; }

        .option-item {
            padding: 18px 24px;
            border-radius: 16px;
            border: 2px solid var(--border);
            background: var(--card);
            cursor: pointer;
            display: flex;
            align-items: center;
            font-weight: 500;
            position: relative;
        }

        .option-item:hover { border-color: var(--primary); background: rgba(99, 102, 241, 0.05); transform: translateY(-2px); }

        .option-item.correct { border-color: var(--success); background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .option-item.wrong { border-color: var(--danger); background: rgba(239, 68, 68, 0.1); color: var(--danger); }

        .option-item.correct::after { content: "✓"; position: absolute; right: 20px; font-weight: bold; }
        .option-item.wrong::after { content: "✕"; position: absolute; right: 20px; font-weight: bold; }

        /* Buttons */
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        .btn:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .btn-secondary { background: var(--text-muted); box-shadow: none; }

        /* Result Screen */
        .result-screen { text-align: center; }
        .result-score { font-size: 5rem; font-weight: 800; color: var(--primary); margin: 20px 0; }
        
        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease-out; }

        @media (max-width: 600px) {
            .quiz-card { padding: 25px; }
            .question-text { font-size: 1.2rem; }
        }
    </style>
</head>
<body data-theme="light">

<div class="app-container">
    <div class="navbar">
        <div style="display:flex; align-items:center; gap:12px">
            <div style="background:var(--primary); color:white; width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center">
                <i class="fas fa-microchip"></i>
            </div>
            <h2 style="margin:0; letter-spacing:-0.5px">CEA Pro <span style="font-weight:300; color:var(--text-muted)">Learning</span></h2>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()">
            <i class="fas fa-moon"></i>
        </button>
    </div>

    <div class="stats-grid" id="stats-grid" style="display:none">
        <div class="stat-card">
            <span class="stat-value" id="stat-correct" style="color:var(--success)">0</span>
            <span class="stat-label">Chính xác</span>
        </div>
        <div class="stat-card">
            <span class="stat-value" id="stat-wrong" style="color:var(--danger)">0</span>
            <span class="stat-label">Làm sai</span>
        </div>
        <div class="stat-card">
            <span class="stat-value" id="stat-percent">0%</span>
            <span class="stat-label">Tỷ lệ đúng</span>
        </div>
    </div>

    <div class="quiz-card">
        <div class="progress-container"><div class="progress-fill" id="progress-fill"></div></div>

        <!-- Setup Screen -->
        <div id="setup-screen" class="setup-screen fade-in">
            <h2>Chào mừng bạn!</h2>
            <p style="color:var(--text-muted)">Chọn chương bạn muốn luyện tập để bắt đầu bài thi trắc nghiệm.</p>
            
            <select id="chapter-select">
                <option value="all">🚀 Toàn bộ ngân hàng câu hỏi (~230 câu)</option>
                <option value="1">1. Lịch sử & Tổng quan (ENIAC, IAS)</option>
                <option value="2">2. Hệ thống phân cấp & Bus</option>
                <option value="3">3. Bộ nhớ Cache</option>
                <option value="4">4. Bộ nhớ trong (RAM, ROM)</option>
                <option value="5">5. Bộ nhớ ngoài (Disk, RAID)</option>
                <option value="6">6. Hệ thống I/O (DMA, Thunderbolt)</option>
                <option value="7">7. Hệ điều hành (OS)</option>
                <option value="8">8. Hệ thống số (Binary, Hex)</option>
                <option value="9">9. Logic số (Gates, Flip-flops)</option>
                <option value="10">10. Tập lệnh (Instruction Sets)</option>
                <option value="11">11. Chế độ địa chỉ</option>
                <option value="12">12. Cấu trúc CPU & Pipelining</option>
                <option value="13">13. RISC</option>
                <option value="14">14. Superscalar</option>
                <option value="15">15. Xử lý song song</option>
                <option value="16">16. Đa lõi (Multicore)</option>
            </select>

            <button class="btn" onclick="startQuiz()" style="width:100%; justify-content:center">
                Bắt đầu ngay <i class="fas fa-arrow-right"></i>
            </button>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" style="display:none" class="fade-in">
            <div class="question-meta">
                <span id="meta-chapter">Chương 1</span>
                <span id="meta-index">Câu hỏi 1/30</span>
            </div>
            <div class="question-text" id="question-text">Loading...</div>
            <div class="options-list" id="options-list"></div>
            
            <div style="margin-top:40px; display:flex; justify-content:space-between; align-items:center">
                <div id="feedback-text" style="font-weight:600"></div>
                <button class="btn" id="next-btn" onclick="renderQuestion()" disabled>
                    Câu tiếp theo <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" style="display:none" class="result-screen fade-in">
            <i class="fas fa-trophy" style="font-size:4rem; color:var(--warning)"></i>
            <h2>Kết quả bài thi</h2>
            <div class="result-score" id="final-score">25/30</div>
            <p id="result-comment" style="color:var(--text-muted); margin-bottom:30px"></p>
            <button class="btn" onclick="location.reload()">
                <i class="fas fa-undo"></i> Thử lại chương này
            </button>
        </div>
    </div>
</div>

<script>
// DỮ LIỆU CÂU HỎI (RÚT GỌN MẪU - BẠN CÓ THỂ CHÈN ĐẦY ĐỦ Ở ĐÂY)
const bank = [
    // SET 1: History

    { ch: 2, name: "Bus & Interconnect", q: "Virtually all contemporary computer designs are based on concepts developed by _________ at IAS.", a: ["John Maulchy", "John von Neumann", "Herman Hollerith", "John Eckert"], c: 1 },

let quiz = [];
let currentIdx = 0;
let correct = 0;
let wrong = 0;

function toggleTheme() {
    const body = document.body;
    const isDark = body.getAttribute('data-theme') === 'dark';
    body.setAttribute('data-theme', isDark ? 'light' : 'dark');
    document.querySelector('.theme-toggle i').className = isDark ? 'fas fa-moon' : 'fas fa-sun';
}

function startQuiz() {
    const ch = document.getElementById('chapter-select').value;
    quiz = ch === 'all' ? [...bank] : bank.filter(q => q.ch == ch);
    quiz.sort(() => Math.random() - 0.5); // Shuffle
    
    currentIdx = 0; correct = 0; wrong = 0;
    
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('stats-grid').style.display = 'grid';
    document.getElementById('quiz-screen').style.display = 'block';
    
    updateStats();
    renderQuestion();
}

function renderQuestion() {
    if (currentIdx >= quiz.length) {
        showResults();
        return;
    }

    const data = quiz[currentIdx];
    document.getElementById('meta-chapter').innerText = `Chương ${data.ch}: ${data.name || ""}`;
    document.getElementById('meta-index').innerText = `Câu hỏi ${currentIdx + 1}/${quiz.length}`;
    document.getElementById('question-text').innerText = data.q;
    document.getElementById('feedback-text').innerText = "";
    document.getElementById('next-btn').disabled = true;

    const list = document.getElementById('options-list');
    list.innerHTML = "";
    
    data.a.forEach((opt, i) => {
        const btn = document.createElement('div');
        btn.className = 'option-item fade-in';
        btn.innerText = opt;
        btn.onclick = () => selectOption(i, btn);
        list.appendChild(btn);
    });

    const progress = (currentIdx / quiz.length) * 100;
    document.getElementById('progress-fill').style.width = progress + "%";
}

function selectOption(idx, el) {
    if (document.getElementById('next-btn').disabled === false) return;

    const correctIdx = quiz[currentIdx].c;
    const items = document.querySelectorAll('.option-item');

    if (idx === correctIdx) {
        el.classList.add('correct');
        correct++;
        document.getElementById('feedback-text').innerHTML = `<span style="color:var(--success)">Chính xác! ✨</span>`;
    } else {
        el.classList.add('wrong');
        items[correctIdx].classList.add('correct');
        wrong++;
        document.getElementById('feedback-text').innerHTML = `<span style="color:var(--danger)">Sai rồi! 😢</span>`;
    }

    updateStats();
    document.getElementById('next-btn').disabled = false;
    currentIdx++;
}

function updateStats() {
    document.getElementById('stat-correct').innerText = correct;
    document.getElementById('stat-wrong').innerText = wrong;
    const total = correct + wrong;
    const percent = total === 0 ? 0 : Math.round((correct / total) * 100);
    document.getElementById('stat-percent').innerText = percent + "%";
}

function showResults() {
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    document.getElementById('progress-fill').style.width = "100%";
    
    const finalScore = document.getElementById('final-score');
    finalScore.innerText = `${correct}/${quiz.length}`;
    
    const percent = (correct / quiz.length) * 100;
    let comment = "";
    if (percent === 100) {
        comment = "Tuyệt vời! Bạn là một chuyên gia thực thụ. 🏆";
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
    } else if (percent >= 80) {
        comment = "Rất tốt! Bạn nắm kiến thức rất chắc chắn. 🔥";
        confetti({ particleCount: 100, spread: 50 });
    } else if (percent >= 50) {
        comment = "Tạm ổn, hãy ôn luyện thêm các câu sai nhé. 👍";
    } else {
        comment = "Bạn cần đọc lại tài liệu chương này kỹ hơn. 📚";
    }
    document.getElementById('result-comment').innerText = comment;
}
</script>
