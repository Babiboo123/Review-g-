<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEA Learning Pro - Full 240+ Questions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #f1f5f9; --bg-card: #ffffff; --text-main: #1e293b;
            --text-muted: #64748b; --primary: #4f46e5; --success: #10b981;
            --danger: #ef4444; --border: #e2e8f0; --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        [data-theme="dark"] {
            --bg-body: #0f172a; --bg-card: #1e293b; --text-main: #f1f5f9;
            --text-muted: #94a3b8; --primary: #818cf8; --success: #34d399;
            --danger: #f87171; --border: #334155; --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }
        * { box-sizing: border-box; transition: background 0.3s, color 0.3s; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); color: var(--text-main); margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 900px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .theme-btn { background: var(--bg-card); border: 1px solid var(--border); padding: 10px; border-radius: 12px; cursor: pointer; color: var(--text-main); }
        
        /* Stats Bar */
        .stats-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-item { background: var(--bg-card); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .stat-value { font-size: 1.5rem; font-weight: 800; display: block; }
        .stat-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; }

        .card { background: var(--bg-card); border-radius: 20px; padding: 30px; box-shadow: var(--shadow); border: 1px solid var(--border); }
        .progress-container { height: 8px; background: var(--border); border-radius: 4px; margin-bottom: 25px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: width 0.4s; }
        
        select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-main); margin-bottom: 20px; }
        .question-meta { font-size: 0.9rem; color: var(--primary); font-weight: 600; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .question-text { font-size: 1.2rem; font-weight: 700; line-height: 1.5; margin-bottom: 25px; }
        
        .options-list { display: grid; gap: 10px; }
        .option { padding: 15px; border: 2px solid var(--border); border-radius: 12px; cursor: pointer; font-weight: 500; background: var(--bg-card); position: relative; }
        .option:hover:not(.disabled) { border-color: var(--primary); }
        .option.correct { border-color: var(--success); background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .option.wrong { border-color: var(--danger); background: rgba(239, 68, 68, 0.1); color: var(--danger); }
        .option.disabled { cursor: not-allowed; }

        .feedback { margin: 20px 0; font-weight: 600; text-align: center; min-height: 24px; }
        .btn { padding: 12px 24px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; background: var(--primary); color: white; width: 100%; }
        .btn:disabled { background: var(--text-muted); cursor: not-allowed; }
        .summary { text-align: center; display: none; }
    </style>
</head>
<body data-theme="light">

<div class="container">
    <header>
        <h1 style="font-size: 1.4rem; margin:0">CEA <span style="font-weight:400">Full Revision</span></h1>
        <button class="theme-btn" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
    </header>

    <div class="stats-bar">
        <div class="stat-item">
            <span class="stat-value" id="correctScore" style="color: var(--success)">0</span>
            <span class="stat-label">Đúng (Lần đầu)</span>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="wrongScore" style="color: var(--danger)">0</span>

        </div>
    </div>

    <select id="chapterSelect" onchange="loadChapter()">
        <option value="0">--- Chọn chương để học ---</option>
        <option value="1">Chương 1: Lịch sử (ENIAC, IAS)</option>
        <option value="2">Chương 2: Interconnects & Bus</option>
        <option value="3">Chương 3: Phân cấp bộ nhớ & Cache</option>
        <option value="4">Chương 4: Bộ nhớ bán dẫn (RAM, ROM)</option>
        <option value="5">Chương 5: Bộ nhớ ngoài (Disk, RAID)</option>
        <option value="6">Chương 6: Hệ thống I/O</option>
        <option value="7">Chương 7: Hệ điều hành (OS)</option>
        <option value="8">Chương 8: Hệ thống số (Full 17 câu)</option>
        <option value="9">Chương 9: Logic số (Gates, Flip-flops)</option>
        <option value="10">Chương 10: Đặc điểm tập lệnh</option>
        <option value="11">Chương 11: Chế độ địa chỉ</option>
        <option value="12">Chương 12: Cấu trúc CPU & Pipeline</option>
        <option value="13">Chương 13: RISC</option>
        <option value="14">Chương 14: Superscalar</option>
        <option value="15">Chương 15: Xử lý song song</option>
        <option value="16">Chương 16: Đa lõi (Multicore)</option>
        <option value="all">TẤT CẢ CÁC CHƯƠNG (FULL)</option>
    </select>

    <div class="card">
        <div id="quizContent" style="display:none">
            <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
            <div class="question-meta"><span id="chapterInfo"></span><span id="counterInfo"></span></div>
            <div class="question-text" id="questionText"></div>
            <div class="options-list" id="optionsList"></div>
            <div class="feedback" id="feedback"></div>
            <button class="btn" id="nextBtn" onclick="nextQuestion()" disabled>Câu tiếp theo</button>
        </div>
        <div class="summary" id="summaryArea">
            <i class="fas fa-trophy" style="font-size:3rem; color:var(--success)"></i>
            <h2>Hoàn thành!</h2>
            <p>Bạn đã xem qua hết các câu hỏi trong phần này.</p>
            <button class="btn" onclick="location.reload()">Chọn chương khác</button>
        </div>
    </div>
</div>

let currentQuestions = [];
let currentIdx = 0;
let answeredCorrectly = false;
let firstTry = true; // Biến kiểm tra xem có phải lần click đầu tiên cho câu này không

function toggleTheme() {
    const body = document.body;
    const isDark = body.getAttribute('data-theme') === 'dark';
    body.setAttribute('data-theme', isDark ? 'light' : 'dark');
    document.querySelector('.theme-btn i').className = isDark ? 'fas fa-moon' : 'fas fa-sun';
}

function loadChapter() {
    const val = document.getElementById('chapterSelect').value;
    if (val === "0") return;
    currentQuestions = (val === "all") ? [...masterData] : masterData.filter(q => q.ch == val);
    currentQuestions.sort(() => Math.random() - 0.5);
    currentIdx = 0;
    document.getElementById('quizContent').style.display = 'block';
    document.getElementById('summaryArea').style.display = 'none';
    renderQuestion();
}

function renderQuestion() {
    answeredCorrectly = false;
    firstTry = true; // Reset trạng thái lần đầu cho câu mới
    const data = currentQuestions[currentIdx];
    document.getElementById('chapterInfo').innerText = `Chương ${data.ch}`;
    document.getElementById('counterInfo').innerText = `Câu ${currentIdx + 1}/${currentQuestions.length}`;
    document.getElementById('questionText').innerText = data.q;
    document.getElementById('feedback').innerText = "";
    document.getElementById('nextBtn').disabled = true;

    const list = document.getElementById('optionsList');
    list.innerHTML = "";
    data.a.forEach((opt, idx) => {
        const div = document.createElement('div');
        div.className = 'option';
        div.innerText = opt;
        div.onclick = () => handleSelect(idx, div);
        list.appendChild(div);
    });
    document.getElementById('progressBar').style.width = ((currentIdx) / currentQuestions.length * 100) + "%";
}

function handleSelect(idx, el) {
    if (answeredCorrectly) return;
    const correctIdx = currentQuestions[currentIdx].c;
    const feedback = document.getElementById('feedback');

    if (idx === correctIdx) {
        el.classList.add('correct');
        feedback.innerText = "Chính xác! Click nút bên dưới để tiếp tục.";
        feedback.style.color = "var(--success)";
        
        if (firstTry) {
            let curCorrect = parseInt(document.getElementById('correctScore').innerText);
            document.getElementById('correctScore').innerText = curCorrect + 1;
        }
        
        answeredCorrectly = true;
        document.getElementById('nextBtn').disabled = false;
        document.querySelectorAll('.option').forEach(opt => opt.classList.add('disabled'));
    } else {
        el.classList.add('wrong');
        feedback.innerText = "Sai rồi! Hãy chọn đáp án khác.";
        feedback.style.color = "var(--danger)";
        
        // Cộng điểm sai
        let curWrong = parseInt(document.getElementById('wrongScore').innerText);
        document.getElementById('wrongScore').innerText = curWrong + 1;
        
        firstTry = false; // Sau khi chọn sai 1 lần, câu này không được tính là "Đúng lần đầu" nữa
    }
}

function nextQuestion() {
    currentIdx++;
    if (currentIdx < currentQuestions.length) renderQuestion();
    else {
        document.getElementById('progressBar').style.width = "100%";
        document.getElementById('quizContent').style.display = 'none';
        document.getElementById('summaryArea').style.display = 'block';
    }
}
